version: "3.8"

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpilot-sandbox
    ports:
      - "${PORT:-9091}:9091"
    volumes:
      - ./data/logs:/app/logs
      - ./data/policy.yaml:/app/policy.yaml
      - ./data/roles-state.json:/app/data/roles-state.json
    environment:
      - SERVER_PORT=9091
      - SANDBOX_API_KEY=${API_KEY:-}
      - SANDBOX_AUTH_ENABLED=${AUTH_ENABLED:-false}
      - SANDBOX_POLICY_PATH=/app/policy.yaml
      - SANDBOX_AUDIT_PATH=/app/logs/audit.jsonl
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "java", "-version"]  
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - sandbox-net

networks:
  sandbox-net:
    driver: bridge
